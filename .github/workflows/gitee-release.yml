name: Publish Gitee release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: gitee-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Rust Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build Windows installer
        run: pnpm tauri:build

      - name: Publish release to Gitee
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITEE_TOKEN)) {
            throw 'GitHub Actions secret GITEE_TOKEN is not configured.'
          }

          ./scripts/publish-gitee.ps1 `
            -Version $env:RELEASE_TAG `
            -SkipBuild
