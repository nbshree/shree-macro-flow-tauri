name: Publish Gitee release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: gitee-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run Rust Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build signed Windows installer and updater artifacts
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'GitHub Actions secret TAURI_SIGNING_PRIVATE_KEY is not configured.'
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw 'GitHub Actions secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD is not configured.'
          }

          pnpm tauri:build:release

      - name: Publish release to Gitee
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITEE_TOKEN)) {
            throw 'GitHub Actions secret GITEE_TOKEN is not configured.'
          }

          $publishArgs = @{
            Version = $env:RELEASE_TAG
            SkipBuild = $true
          }
          if ([int]$env:RUN_ATTEMPT -gt 1) {
            $publishArgs.RepairExisting = $true
          }

          ./scripts/publish-gitee.ps1 @publishArgs
